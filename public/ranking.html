<script>
// LorranStack v2.1 — Cliente Supabase direto no frontend
const _SB_URL = 'https://jkgrmlfqgprcwfooovkx.supabase.co';
const _SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprZ3JtbGZxZ3ByY3dmb29vdmt4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTY4NTIsImV4cCI6MjA4ODgzMjg1Mn0.f0N9ase2ZoYKq4JL7zVT9rzrjjsslYMPLcwd-k5Z8DA';

async function _sb(path) {
  const res = await fetch(_SB_URL + '/rest/v1/' + path, {
    headers: { 'apikey': _SB_KEY, 'Authorization': 'Bearer ' + _SB_KEY }
  });
  if (!res.ok) throw new Error('SB ' + res.status);
  return res.json();
}

window.DB = {
  async getCategories() {
    return _sb('ls_categories?select=id,name,slug,icon&order=sort_order.asc');
  },
  async getFeatured() {
    const rows = await _sb('ls_saas?select=id,name,slug,tagline,logo_url,pricing_type,price_label,upvotes,avg_rating,review_count,is_featured,category_id,creator_id&is_featured=eq.true&status=in.(approved,featured)&order=upvotes.desc&limit=6');
    return window.DB._joinMeta(rows);
  },
  async getSaas({ sort='upvotes', order='desc', page=1, limit=12, category, search } = {}) {
    let q = 'ls_saas?select=id,name,slug,tagline,logo_url,pricing_type,price_label,upvotes,views,avg_rating,review_count,is_featured,category_id,creator_id&status=in.(approved,featured)';
    if (search) q += '&or=(name.ilike.*' + encodeURIComponent(search) + '*,tagline.ilike.*' + encodeURIComponent(search) + '*)';
    q += '&order=' + sort + '.' + order + '&limit=' + limit + '&offset=' + ((page-1)*limit);
    const rows = await _sb(q);
    const joined = await window.DB._joinMeta(rows);
    if (category) {
      const cats = await window.DB.getCategories();
      const cat = cats.find(function(c){ return c.slug === category; });
      if (cat) return joined.filter(function(r){ return r.category_id === cat.id; });
    }
    return joined;
  },
  async getSaasBySlug(slug) {
    const rows = await _sb('ls_saas?select=*&slug=eq.' + slug + '&status=in.(approved,featured)&limit=1');
    if (!rows.length) return null;
    const s = rows[0];
    const cats  = await _sb('ls_categories?select=name,slug,icon&id=eq.' + s.category_id);
    const users = await _sb('ls_users?select=name,bio,website&id=eq.' + s.creator_id);
    const revs  = await _sb('ls_reviews?select=id,rating,comment,created_at,user_id&saas_id=eq.' + s.id + '&order=created_at.desc&limit=20');
    s.category_name = cats[0] ? cats[0].name : '';
    s.category_icon = cats[0] ? cats[0].icon : '';
    s.creator_name  = users[0] ? users[0].name : 'Anônimo';
    s.creator_bio   = users[0] ? users[0].bio  : '';
    s.creator_website = users[0] ? users[0].website : '';
    if (revs.length) {
      const uids = revs.map(function(r){ return r.user_id; }).filter(Boolean);
      const ulist = uids.length ? await _sb('ls_users?select=id,name&id=in.(' + uids.join(',') + ')') : [];
      const umap = {};
      ulist.forEach(function(u){ umap[u.id] = u.name; });
      revs.forEach(function(r){ r.user_name = umap[r.user_id] || 'Usuário'; });
    }
    s.reviews = revs;
    return s;
  },
  async getStats() {
    const [r1,r2] = await Promise.all([
      fetch(_SB_URL+'/rest/v1/ls_saas?select=id&status=in.(approved,featured)',{headers:{'apikey':_SB_KEY,'Authorization':'Bearer '+_SB_KEY,'Prefer':'count=exact','Range':'0-0'}}),
      fetch(_SB_URL+'/rest/v1/ls_users?select=id',{headers:{'apikey':_SB_KEY,'Authorization':'Bearer '+_SB_KEY,'Prefer':'count=exact','Range':'0-0'}})
    ]);
    return {
      saas:  parseInt((r1.headers.get('content-range')||'0/15').split('/')[1]),
      users: parseInt((r2.headers.get('content-range')||'0/8').split('/')[1])
    };
  },
  async _joinMeta(rows) {
    if (!rows.length) return rows;
    const cids = [...new Set(rows.map(function(r){return r.category_id;}).filter(Boolean))];
    const uids = [...new Set(rows.map(function(r){return r.creator_id;}).filter(Boolean))];
    const cats  = cids.length ? await _sb('ls_categories?select=id,name,slug,icon&id=in.(' + cids.join(',') + ')') : [];
    const users = uids.length ? await _sb('ls_users?select=id,name&id=in.(' + uids.join(',') + ')') : [];
    const cmap={}, umap={};
    cats.forEach(function(c){cmap[c.id]=c;}); users.forEach(function(u){umap[u.id]=u;});
    return rows.map(function(r){
      return Object.assign({},r,{
        category_name: cmap[r.category_id] ? cmap[r.category_id].name : '',
        category_icon: cmap[r.category_id] ? cmap[r.category_id].icon : '',
        category_slug: cmap[r.category_id] ? cmap[r.category_id].slug : '',
        creator_name:  umap[r.creator_id]  ? umap[r.creator_id].name  : 'Anônimo',
      });
    });
  }
};
window.API = null;

</script>
</head>
<body>

<!-- Hero -->
<section class="hero-grid pt-32 pb-14 px-4 relative overflow-hidden">

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-40 rounded-full opacity-20 blur-3xl" style="background:radial-gradient(ellipse,#fbbf24,transparent 70%)"></div>

<div class="max-w-5xl mx-auto px-4 sm:px-6 pb-20">

  <!-- Tabs -->
  <div class="flex items-center gap-1 mb-8 p-1 rounded-xl border border-white/8 w-fit" style="background:rgba(255,255,255,.02)">
    <button class="tab-btn active" onclick="switchTab('upvotes',this)">▲ Mais votados</button>
    <button class="tab-btn" onclick="switchTab('views',this)">👁 Mais vistos</button>
    <button class="tab-btn" onclick="switchTab('clicks',this)">🖱 Mais clicados</button>
    <button class="tab-btn" onclick="switchTab('rating',this)">⭐ Melhor avaliados</button>
  </div>

  <!-- Pódio Top 3 -->
  <div id="podium" class="grid grid-cols-3 gap-4 mb-8"></div>

  <!-- Lista completa -->
  <div id="ranking-list" class="space-y-3"></div>

</div>

<script>
const API = window.API || 'http://localhost:3000/api';
let allData = [];
let currentSort = 'upvotes';

// Label da semana atual
const now = new Date();
const monday = new Date(now);
monday.setDate(now.getDate() - now.getDay() + 1);
const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
document.getElementById('week-label').textContent =
  `${monday.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})} — ${sunday.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'})}`;

const DEMO = [
  {name:'DevDocs BR',slug:'devdocs-br',icon:'📖',cat:'Dev',pricing:'free',upvotes:891,views:4521,clicks:1203,avg_rating:4.9,review_count:203,tagline:'Documentação técnica em português'},
  {name:'APIForge',slug:'apiforge',icon:'⚡',cat:'Dev',pricing:'freemium',upvotes:634,views:3102,clicks:891,avg_rating:4.6,review_count:89,tagline:'APIs REST sem escrever servidor'},
  {name:'DevKit Pro',slug:'devkitpro',icon:'💻',cat:'Dev',pricing:'free',upvotes:789,views:3201,clicks:412,avg_rating:4.7,review_count:103,tagline:'Utilitários essenciais para devs'},
  {name:'SQLPad',slug:'sqlpad',icon:'🗄️',cat:'Dev',pricing:'free',upvotes:512,views:2890,clicks:734,avg_rating:4.8,review_count:67,tagline:'Editor SQL com IA explicativa'},
  {name:'Resumo.ai',slug:'resumo-ai',icon:'📄',cat:'Prod',pricing:'freemium',upvotes:445,views:2234,clicks:612,avg_rating:4.4,review_count:54,tagline:'Resuma qualquer conteúdo em segundos'},
  {name:'DesignFlow',slug:'designflow',icon:'🎨',cat:'Design',pricing:'subscription',upvotes:421,views:2103,clicks:356,avg_rating:4.8,review_count:67,tagline:'Design colaborativo para times modernos'},
  {name:'Logosfera',slug:'logosfera',icon:'✨',cat:'Design',pricing:'paid',upvotes:341,views:1789,clicks:523,avg_rating:4.2,review_count:38,tagline:'Logotipos com IA em minutos'},
  {name:'FlowAI',slug:'flowai',icon:'🤖',cat:'IA',pricing:'freemium',upvotes:342,views:1204,clicks:287,avg_rating:4.5,review_count:28,tagline:'Automatize fluxos com IA'},
  {name:'CopyGenius',slug:'copygenius',icon:'✍️',cat:'Mkt',pricing:'freemium',upvotes:287,views:1456,clicks:398,avg_rating:4.3,review_count:41,tagline:'Copies em português com IA'},
  {name:'FormBlocks',slug:'formblocks',icon:'📋',cat:'Auto',pricing:'freemium',upvotes:278,views:1345,clicks:367,avg_rating:4.1,review_count:29,tagline:'Formulários bonitos sem código'},
];

function priceBadge(t){
  return {free:'<span class="text-xs px-1.5 py-0.5 rounded-full badge-free">Grátis</span>',freemium:'<span class="text-xs px-1.5 py-0.5 rounded-full badge-freemium">Freemium</span>',paid:'<span class="text-xs px-1.5 py-0.5 rounded-full badge-paid">Pago</span>',subscription:'<span class="text-xs px-1.5 py-0.5 rounded-full badge-sub">Assinatura</span>'}[t]||'';
}

function starsHtml(r){
  return Array.from({length:5},(_,i)=>`<svg width="11" height="11" viewBox="0 0 24 24" fill="${i<Math.round(r||0)?'#fbbf24':'#2d2d3d'}"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`).join('');
}

function metricLabel(s, item){
  const map = {
    upvotes: `▲ ${item.upvotes.toLocaleString('pt-BR')} upvotes`,
    views:   `👁 ${item.views.toLocaleString('pt-BR')} views`,
    clicks:  `🖱 ${item.clicks.toLocaleString('pt-BR')} cliques`,
    rating:  `⭐ ${Number(item.avg_rating||0).toFixed(1)} / 5 (${item.review_count || 0})`,
  };
  return map[s] || '';
}

function renderPodium(top3){
  const order = [1,0,2]; // 2º, 1º, 3º no layout
  const podiumColors = ['rgba(156,163,175,.15)','rgba(251,191,36,.15)','rgba(205,124,47,.15)'];
  const borderColors = ['rgba(156,163,175,.3)','rgba(251,191,36,.4)','rgba(205,124,47,.3)'];
  const rankEmoji = ['🥇','🥈','🥉'];
  const heights = ['h-28','h-36','h-24'];

  return `<div class="col-span-3 grid grid-cols-3 gap-4 items-end">
    ${order.map(pos => {
      const s = top3[pos];
      if(!s) return '<div></div>';
      return `<a href="produto.html?slug=${s.slug}" class="block rounded-2xl p-4 text-center border transition-all hover:scale-105"
        style="background:${podiumColors[pos]};border-color:${borderColors[pos]}">
        <div class="text-2xl mb-1">${rankEmoji[pos]}</div>
        <div class="text-2xl mb-2">${s.icon}</div>
        <div class="font-display font-700 text-white text-sm mb-1">${s.name}</div>
        <div class="text-xs text-gray-400 mb-2">${s.tagline}</div>
        <div class="text-xs font-500" style="color:${pos===0?'#fbbf24':pos===1?'#4ade80':'#cd7c2f'}">${metricLabel(currentSort,s)}</div>
      </a>`;
    }).join('')}
  </div>`;
}

function render(sortKey){
  currentSort = sortKey;
  const sorted = [...DEMO].sort((a,b)=>(b[sortKey]||0)-(a[sortKey]||0));

  document.getElementById('podium').innerHTML = renderPodium(sorted.slice(0,3));

  document.getElementById('ranking-list').innerHTML = sorted.slice(3).map((s, i) => `
    <a href="produto.html?slug=${s.slug}" class="row">
      <span class="rank-num rank-other">${i+4}</span>
      <div class="w-9 h-9 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style="background:rgba(255,255,255,.05)">${s.icon}</div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="font-500 text-white text-sm">${s.name}</span>
          ${priceBadge(s.pricing)}
          <span class="text-xs px-1.5 py-0.5 rounded-full text-gray-600" style="background:rgba(255,255,255,.04)">${s.cat}</span>
        </div>
        <p class="text-xs text-gray-500 truncate mt-0.5">${s.tagline}</p>
      </div>
      <div class="text-right flex-shrink-0">
        <div class="text-sm font-500 text-white">${metricLabel(sortKey, s).split(' ')[1]||''}</div>
        <div class="text-xs text-gray-600">${metricLabel(sortKey, s).split(' ')[0]||''}</div>
      </div>
      <div class="hidden sm:flex items-center gap-0.5 flex-shrink-0">${starsHtml(s.avg_rating)}</div>
    </a>`).join('');
}

function switchTab(key, btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(key);
}

// Tenta carregar dados reais
DB.getSaas({ sort: 'upvotes', order: 'desc', limit: 15 }).then(rows => {
  if (rows && rows.length) {
    DEMO.length = 0;
    rows.forEach(function(s) {
      DEMO.push({
        name: s.name, slug: s.slug,
        icon: s.category_icon || '🔧',
        cat: s.category_name || '',
        pricing: s.pricing_type || 'free',
        upvotes: s.upvotes || 0,
        views: s.views || 0,
        clicks: s.clicks || 0,
        avg_rating: parseFloat(s.avg_rating) || 0,
        review_count: s.review_count || 0,
        tagline: s.tagline || ''
      });
    });
  }
  render('upvotes');
}).catch(function() { render('upvotes'); });
</script>
</body>
