  <style>
    * { box-sizing: border-box; }
    body { font-family:'Space Grotesk',sans-serif; background:#0a0a0f; color:#e8e8f0; }
    .card { background:#111118; border:1px solid rgba(255,255,255,0.06); border-radius:16px; }
    .saas-card { background:#111118; border:1px solid rgba(255,255,255,0.06); border-radius:16px; transition:transform .2s, border-color .2s, box-shadow .2s; text-decoration:none; display:block; }
    .saas-card:hover { transform:translateY(-3px); border-color:rgba(74,222,128,.3); box-shadow:0 16px 32px rgba(0,0,0,.3); }
    .filter-btn { cursor:pointer; padding:6px 14px; border-radius:8px; font-size:13px; font-weight:500; transition:all .2s; border:1px solid rgba(255,255,255,.08); color:#6b7280; background:rgba(255,255,255,.03); }
    .filter-btn:hover, .filter-btn.active { background:rgba(74,222,128,.1); border-color:rgba(74,222,128,.3); color:#4ade80; }
    .input-search { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:12px 16px 12px 44px; color:#e8e8f0; width:100%; outline:none; transition:border-color .2s; font-family:inherit; font-size:14px; }

    .badge-free { background:rgba(74,222,128,.15); color:#4ade80; }
    .badge-freemium { background:rgba(251,191,36,.15); color:#fbbf24; }
    .badge-paid { background:rgba(129,140,248,.15); color:#818cf8; }
    .badge-subscription { background:rgba(251,113,133,.15); color:#fb7185; }
    .skeleton { background:linear-gradient(90deg,#111118 25%,#1a1a24 50%,#111118 75%); background-size:200%; animation:shimmer 1.4s infinite; border-radius:12px; }
    @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }
    ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:#0a0a0f; }
    ::-webkit-scrollbar-thumb { background:#2d2d3d; border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:#4ade80; }
    .sidebar-section { margin-bottom:24px; }
    .sidebar-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:#6b7280; margin-bottom:10px; }

<script>
// LorranStack v2.1 — Cliente Supabase direto no frontend
const _SB_URL = 'https://jkgrmlfqgprcwfooovkx.supabase.co';
const _SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprZ3JtbGZxZ3ByY3dmb29vdmt4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTY4NTIsImV4cCI6MjA4ODgzMjg1Mn0.f0N9ase2ZoYKq4JL7zVT9rzrjjsslYMPLcwd-k5Z8DA';

async function _sb(path) {
  const res = await fetch(_SB_URL + '/rest/v1/' + path, {
    headers: { 'apikey': _SB_KEY, 'Authorization': 'Bearer ' + _SB_KEY }
  });
  if (!res.ok) throw new Error('SB ' + res.status);
  return res.json();
}

window.DB = {
  async getCategories() {
    return _sb('ls_categories?select=id,name,slug,icon&order=sort_order.asc');
  },
  async getFeatured() {
    const rows = await _sb('ls_saas?select=id,name,slug,tagline,logo_url,pricing_type,price_label,upvotes,avg_rating,review_count,is_featured,category_id,creator_id&is_featured=eq.true&status=in.(approved,featured)&order=upvotes.desc&limit=6');
    return window.DB._joinMeta(rows);
  },
  async getSaas({ sort='upvotes', order='desc', page=1, limit=12, category, search } = {}) {
    let q = 'ls_saas?select=id,name,slug,tagline,logo_url,pricing_type,price_label,upvotes,views,avg_rating,review_count,is_featured,category_id,creator_id&status=in.(approved,featured)';
    if (search) q += '&or=(name.ilike.*' + encodeURIComponent(search) + '*,tagline.ilike.*' + encodeURIComponent(search) + '*)';
    q += '&order=' + sort + '.' + order + '&limit=' + limit + '&offset=' + ((page-1)*limit);
    const rows = await _sb(q);
    const joined = await window.DB._joinMeta(rows);
    if (category) {
      const cats = await window.DB.getCategories();
      const cat = cats.find(function(c){ return c.slug === category; });
      if (cat) return joined.filter(function(r){ return r.category_id === cat.id; });
    }
    return joined;
  },
  async getSaasBySlug(slug) {
    const rows = await _sb('ls_saas?select=*&slug=eq.' + slug + '&status=in.(approved,featured)&limit=1');
    if (!rows.length) return null;
    const s = rows[0];
    const cats  = await _sb('ls_categories?select=name,slug,icon&id=eq.' + s.category_id);
    const users = await _sb('ls_users?select=name,bio,website&id=eq.' + s.creator_id);
    const revs  = await _sb('ls_reviews?select=id,rating,comment,created_at,user_id&saas_id=eq.' + s.id + '&order=created_at.desc&limit=20');
    s.category_name = cats[0] ? cats[0].name : '';
    s.category_icon = cats[0] ? cats[0].icon : '';
    s.creator_name  = users[0] ? users[0].name : 'Anônimo';
    s.creator_bio   = users[0] ? users[0].bio  : '';
    s.creator_website = users[0] ? users[0].website : '';
    if (revs.length) {
      const uids = revs.map(function(r){ return r.user_id; }).filter(Boolean);
      const ulist = uids.length ? await _sb('ls_users?select=id,name&id=in.(' + uids.join(',') + ')') : [];
      const umap = {};
      ulist.forEach(function(u){ umap[u.id] = u.name; });
      revs.forEach(function(r){ r.user_name = umap[r.user_id] || 'Usuário'; });
    }
    s.reviews = revs;
    return s;
  },
  async getStats() {
    const [r1,r2] = await Promise.all([
      fetch(_SB_URL+'/rest/v1/ls_saas?select=id&status=in.(approved,featured)',{headers:{'apikey':_SB_KEY,'Authorization':'Bearer '+_SB_KEY,'Prefer':'count=exact','Range':'0-0'}}),
      fetch(_SB_URL+'/rest/v1/ls_users?select=id',{headers:{'apikey':_SB_KEY,'Authorization':'Bearer '+_SB_KEY,'Prefer':'count=exact','Range':'0-0'}})
    ]);
    return {
      saas:  parseInt((r1.headers.get('content-range')||'0/15').split('/')[1]),
      users: parseInt((r2.headers.get('content-range')||'0/8').split('/')[1])
    };
  },
  async _joinMeta(rows) {
    if (!rows.length) return rows;
    const cids = [...new Set(rows.map(function(r){return r.category_id;}).filter(Boolean))];
    const uids = [...new Set(rows.map(function(r){return r.creator_id;}).filter(Boolean))];
    const cats  = cids.length ? await _sb('ls_categories?select=id,name,slug,icon&id=in.(' + cids.join(',') + ')') : [];
    const users = uids.length ? await _sb('ls_users?select=id,name&id=in.(' + uids.join(',') + ')') : [];
    const cmap={}, umap={};
    cats.forEach(function(c){cmap[c.id]=c;}); users.forEach(function(u){umap[u.id]=u;});
    return rows.map(function(r){
      return Object.assign({},r,{
        category_name: cmap[r.category_id] ? cmap[r.category_id].name : '',
        category_icon: cmap[r.category_id] ? cmap[r.category_id].icon : '',
        category_slug: cmap[r.category_id] ? cmap[r.category_id].slug : '',
        creator_name:  umap[r.creator_id]  ? umap[r.creator_id].name  : 'Anônimo',
      });
    });
  }
};
window.API = null;

</script>
</head>
<body>

<!-- Navbar -->

    <aside class="hidden lg:block w-56 flex-shrink-0">
      <div class="sticky top-24 space-y-0">

        <!-- Ordenar -->

          <p class="sidebar-label">Ordenar por</p>
          <div class="space-y-1">
            <button class="filter-btn active w-full text-left" data-sort="created_at" onclick="setSort('created_at', this)">🕐 Mais recentes</button>
            <button class="filter-btn w-full text-left" data-sort="upvotes" onclick="setSort('upvotes', this)">▲ Mais votados</button>

<script>
const API = window.API || 'http://localhost:3000/api';
let state = { sort:'created_at', category:'', price:'', search:'', page:1, total:0 };

// ── Init ──────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const user = JSON.parse(localStorage.getItem('ls_user') || 'null');
  if (user) {
    document.getElementById('nav-auth').innerHTML =
      `<span class="text-sm text-gray-400">${user.name.split(' ')[0]}</span>
       <a href="dashboard.html" class="text-sm px-3 py-1.5 rounded-lg border border-white/10 text-gray-300 hover:border-brand-500 hover:text-white transition-all">Dashboard</a>`;
  }

  // URL params
  const p = new URLSearchParams(window.location.search);
  if (p.get('category')) { state.category = p.get('category'); }
  if (p.get('search'))   { state.search = p.get('search'); document.getElementById('search-input').value = state.search; }

  loadCategories();
  loadProducts();
});

// ── Categorias ────────────────────────────────
async function loadCategories() {
  try {
    const cats = await DB.getCategories();
    const sidebar = document.getElementById('sidebar-cats');
    const mobile = document.getElementById('cat-pills-mobile');

    cats.forEach(c => {
      // Sidebar
      const btn = document.createElement('button');
      btn.className = `filter-btn w-full text-left ${state.category === c.slug ? 'active' : ''}`;
      btn.dataset.cat = c.slug;
      btn.innerHTML = `${c.icon || ''} ${c.name} <span class="text-gray-600 ml-1 text-xs">${c.saas_count}</span>`;
      btn.onclick = () => setCategory(c.slug, btn);
      sidebar.appendChild(btn);

      // Mobile pills
      const pill = document.createElement('button');
      pill.className = `filter-btn flex-shrink-0 ${state.category === c.slug ? 'active' : ''}`;
      pill.dataset.cat = c.slug;
      pill.innerHTML = `${c.icon || ''} ${c.name}`;
      pill.onclick = () => setCategory(c.slug, pill);
      mobile.appendChild(pill);
    });
  } catch {}
}

// ── Setters de filtro ─────────────────────────
function setSort(val, btn) {
  state.sort = val; state.page = 1;
  document.querySelectorAll('[data-sort]').forEach(b => b.classList.toggle('active', b.dataset.sort === val));
  loadProducts();
}
function setPrice(val, btn) {
  state.price = val; state.page = 1;
  document.querySelectorAll('[data-price]').forEach(b => b.classList.toggle('active', b.dataset.price === val));
  loadProducts();
}
function setCategory(val, btn) {
  state.category = val; state.page = 1;
  document.querySelectorAll('[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === val));
  loadProducts();
}
function onSearchInput(val) {
  clearTimeout(window._st);
  window._st = setTimeout(() => { state.search = val; state.page = 1; loadProducts(); }, 380);
}

// ── Carrega produtos ──────────────────────────
async function loadProducts() {
  const grid = document.getElementById('explore-grid');
  grid.innerHTML = Array(6).fill(`<div class="skeleton" style="height:180px;"></div>`).join('');

  const params = new URLSearchParams({ sort: state.sort, page: state.page, limit: 12 });
  if (state.category) params.set('category', state.category);
  if (state.search)   params.set('search', state.search);

  try {
    const data_raw = await DB.getSaas({
      sort: state.sort, page: state.page, limit: 12,
      category: state.category || undefined,
      search: state.search || undefined
    });
    const data = { data: data_raw, pagination: { total: data_raw.length, page: state.page, limit: 12, pages: Math.ceil(data_raw.length/12)||1 } };
    state.total = data.pagination?.total || 0;

    // Filtro de preço (client-side já que a API não tem esse filtro ainda)
    let products = data.data || [];
    if (state.price) products = products.filter(p => p.pricing_type === state.price);

    document.getElementById('result-summary').textContent =
      `${state.total} ferramentas encontradas${state.search ? ` para "${state.search}"` : ''}`;

    if (!products.length) {
      grid.innerHTML = `<div class="col-span-full text-center py-20">
        <div class="text-4xl mb-3">🔍</div>
        <p class="text-gray-500">Nenhuma ferramenta encontrada</p>
        <button onclick="clearFilters()" class="text-brand-400 text-sm mt-2 hover:text-brand-300">Limpar filtros</button>
      </div>`;
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    grid.innerHTML = products.map(renderCard).join('');
    renderPagination(data.pagination);
  } catch {
    grid.innerHTML = getDemoData().map(renderCard).join('');
    document.getElementById('result-summary').textContent = '6 ferramentas (modo demo)';
  }
}

function clearFilters() {
  state = { sort:'created_at', category:'', price:'', search:'', page:1, total:0 };
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sort === 'created_at' || b.dataset.price === '' || b.dataset.cat === '');
  });
  loadProducts();
}

// ── Card ──────────────────────────────────────
function renderCard(s) {
  const priceBadge = {
    free: '<span class="text-xs px-2 py-0.5 rounded-full badge-free">Grátis</span>',
    freemium: '<span class="text-xs px-2 py-0.5 rounded-full badge-freemium">Freemium</span>',
    paid: '<span class="text-xs px-2 py-0.5 rounded-full badge-paid">Pago</span>',
    subscription: '<span class="text-xs px-2 py-0.5 rounded-full badge-subscription">Assinatura</span>',
  }[s.pricing_type] || '';

  const stars = Array.from({length:5}, (_,i) =>
    `<svg width="11" height="11" viewBox="0 0 24 24" fill="${i < Math.round(s.avg_rating||0) ? '#fbbf24' : '#2d2d3d'}">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
    </svg>`
  ).join('');

  return `
    <a href="saas.html?slug=${s.slug}" class="saas-card p-5">
      <div class="flex items-start gap-3 mb-3">
        <div class="w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0 text-lg font-800 border border-white/8"
             style="background:rgba(255,255,255,.05);font-family:Syne,sans-serif;">
          ${s.logo_url ? `<img src="${s.logo_url}" alt="${s.name}" class="w-full h-full object-cover rounded-xl"/>` : s.name.charAt(0).toUpperCase()}
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-1.5 flex-wrap">
            <span class="font-display font-700 text-white text-sm">${s.name}</span>
            ${s.is_featured ? '<span class="text-xs" style="color:#4ade80;">★</span>' : ''}
          </div>
          <p class="text-xs text-gray-500 truncate mt-0.5">${s.tagline || ''}</p>
        </div>
      </div>
      <p class="text-gray-400 text-xs leading-relaxed mb-4" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
        ${s.description || ''}
      </p>
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-1.5">
          <span class="text-sm">${s.category_icon || ''}</span>
          <span class="text-xs text-gray-600">${s.category_name || ''}</span>
        </div>
        ${priceBadge}
      </div>
      <div class="flex items-center gap-3 mt-3 pt-3 border-t border-white/5">
        <div class="flex gap-0.5">${stars}</div>
        <span class="text-xs text-gray-600">(${s.review_count || 0})</span>
        <span class="ml-auto text-xs text-gray-600">▲ ${s.upvotes || 0}</span>
        <span class="text-xs text-gray-600">👁 ${(s.views||0).toLocaleString('pt-BR')}</span>
      </div>
    </a>`;
}

// ── Paginação ─────────────────────────────────
function renderPagination(p) {
  const el = document.getElementById('pagination');
  if (!p || p.pages <= 1) { el.innerHTML = ''; return; }
  const range = Array.from({length: Math.min(p.pages, 8)}, (_, i) => i + 1);
  el.innerHTML = range.map(i => `
    <button onclick="goPage(${i})"
      class="w-9 h-9 rounded-lg text-sm font-500 border transition-colors
             ${i === p.page ? 'border-brand-500 text-brand-400' : 'border-white/8 text-gray-600 hover:border-white/20 hover:text-white'}"
      style="background:${i === p.page ? 'rgba(74,222,128,.1)' : 'rgba(255,255,255,.03)'}">
      ${i}
    </button>`).join('');
}
function goPage(p) {
  state.page = p;
  loadProducts();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Demo ──────────────────────────────────────
