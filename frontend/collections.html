<script>
// LorranStack v2.1 — Cliente Supabase direto no frontend
const _SB_URL = 'https://jkgrmlfqgprcwfooovkx.supabase.co';
const _SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprZ3JtbGZxZ3ByY3dmb29vdmt4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTY4NTIsImV4cCI6MjA4ODgzMjg1Mn0.f0N9ase2ZoYKq4JL7zVT9rzrjjsslYMPLcwd-k5Z8DA';

async function _sb(path) {
  const res = await fetch(_SB_URL + '/rest/v1/' + path, {
    headers: { 'apikey': _SB_KEY, 'Authorization': 'Bearer ' + _SB_KEY }
  });
  if (!res.ok) throw new Error('SB ' + res.status);
  return res.json();
}

window.DB = {
  async getCategories() {
    return _sb('ls_categories?select=id,name,slug,icon&order=sort_order.asc');
  },
  async getFeatured() {
    const rows = await _sb('ls_saas?select=id,name,slug,tagline,logo_url,pricing_type,price_label,upvotes,avg_rating,review_count,is_featured,category_id,creator_id&is_featured=eq.true&status=in.(approved,featured)&order=upvotes.desc&limit=6');
    return window.DB._joinMeta(rows);
  },
  async getSaas({ sort='upvotes', order='desc', page=1, limit=12, category, search } = {}) {
    let q = 'ls_saas?select=id,name,slug,tagline,logo_url,pricing_type,price_label,upvotes,views,avg_rating,review_count,is_featured,category_id,creator_id&status=in.(approved,featured)';
    if (search) q += '&or=(name.ilike.*' + encodeURIComponent(search) + '*,tagline.ilike.*' + encodeURIComponent(search) + '*)';
    q += '&order=' + sort + '.' + order + '&limit=' + limit + '&offset=' + ((page-1)*limit);
    const rows = await _sb(q);
    const joined = await window.DB._joinMeta(rows);
    if (category) {
      const cats = await window.DB.getCategories();
      const cat = cats.find(function(c){ return c.slug === category; });
      if (cat) return joined.filter(function(r){ return r.category_id === cat.id; });
    }
    return joined;
  },
  async getSaasBySlug(slug) {
    const rows = await _sb('ls_saas?select=*&slug=eq.' + slug + '&status=in.(approved,featured)&limit=1');
    if (!rows.length) return null;
    const s = rows[0];
    const cats  = await _sb('ls_categories?select=name,slug,icon&id=eq.' + s.category_id);
    const users = await _sb('ls_users?select=name,bio,website&id=eq.' + s.creator_id);
    const revs  = await _sb('ls_reviews?select=id,rating,comment,created_at,user_id&saas_id=eq.' + s.id + '&order=created_at.desc&limit=20');
    s.category_name = cats[0] ? cats[0].name : '';
    s.category_icon = cats[0] ? cats[0].icon : '';
    s.creator_name  = users[0] ? users[0].name : 'Anônimo';
    s.creator_bio   = users[0] ? users[0].bio  : '';
    s.creator_website = users[0] ? users[0].website : '';
    if (revs.length) {
      const uids = revs.map(function(r){ return r.user_id; }).filter(Boolean);
      const ulist = uids.length ? await _sb('ls_users?select=id,name&id=in.(' + uids.join(',') + ')') : [];
      const umap = {};
      ulist.forEach(function(u){ umap[u.id] = u.name; });
      revs.forEach(function(r){ r.user_name = umap[r.user_id] || 'Usuário'; });
    }
    s.reviews = revs;
    return s;
  },
  async getStats() {
    const [r1,r2] = await Promise.all([
      fetch(_SB_URL+'/rest/v1/ls_saas?select=id&status=in.(approved,featured)',{headers:{'apikey':_SB_KEY,'Authorization':'Bearer '+_SB_KEY,'Prefer':'count=exact','Range':'0-0'}}),
      fetch(_SB_URL+'/rest/v1/ls_users?select=id',{headers:{'apikey':_SB_KEY,'Authorization':'Bearer '+_SB_KEY,'Prefer':'count=exact','Range':'0-0'}})
    ]);
    return {
      saas:  parseInt((r1.headers.get('content-range')||'0/15').split('/')[1]),
      users: parseInt((r2.headers.get('content-range')||'0/8').split('/')[1])
    };
  },
  async _joinMeta(rows) {
    if (!rows.length) return rows;
    const cids = [...new Set(rows.map(function(r){return r.category_id;}).filter(Boolean))];
    const uids = [...new Set(rows.map(function(r){return r.creator_id;}).filter(Boolean))];
    const cats  = cids.length ? await _sb('ls_categories?select=id,name,slug,icon&id=in.(' + cids.join(',') + ')') : [];
    const users = uids.length ? await _sb('ls_users?select=id,name&id=in.(' + uids.join(',') + ')') : [];
    const cmap={}, umap={};
    cats.forEach(function(c){cmap[c.id]=c;}); users.forEach(function(u){umap[u.id]=u;});
    return rows.map(function(r){
      return Object.assign({},r,{
        category_name: cmap[r.category_id] ? cmap[r.category_id].name : '',
        category_icon: cmap[r.category_id] ? cmap[r.category_id].icon : '',
        category_slug: cmap[r.category_id] ? cmap[r.category_id].slug : '',
        creator_name:  umap[r.creator_id]  ? umap[r.creator_id].name  : 'Anônimo',
      });
    });
  }
};
window.API = null;

</script>

<script>
const API = window.API || 'http://localhost:3000/api';

const COLLECTIONS = [
  {
    title:'Essenciais para Devs',emoji:'💻',

  },

    products:[
      {name:'PostScheduler',slug:'postscheduler',icon:'📅',pricing:'freemium',rating:4.0,votes:256},
      {name:'CopyGenius',slug:'copygenius',icon:'✍️',pricing:'freemium',rating:4.3,votes:287},
      {name:'FlowAI',slug:'flowai',icon:'🤖',pricing:'freemium',rating:4.5,votes:342},
    ]
  },
  {
    title:'IA que funciona',emoji:'🤖',
    desc:'Sem hype — ferramentas de IA com resultado real.',
    color:'rgba(129,140,248,.08)',border:'rgba(129,140,248,.25)',
    products:[
      {name:'FlowAI',slug:'flowai',icon:'🤖',pricing:'freemium',rating:4.5,votes:342},
      {name:'CopyGenius',slug:'copygenius',icon:'✍️',pricing:'freemium',rating:4.3,votes:287},
      {name:'Resumo.ai',slug:'resumo-ai',icon:'📄',pricing:'freemium',rating:4.4,votes:445},
      {name:'Logosfera',slug:'logosfera',icon:'🎨',pricing:'paid',rating:4.2,votes:341},
    ]
  },
  {
    title:'Ferramentas Gratuitas',emoji:'🆓',
    desc:'Poder real sem pagar nada.',
    color:'rgba(29,158,117,.08)',border:'rgba(29,158,117,.3)',
    products:[
      {name:'DevKit Pro',slug:'devkitpro',icon:'💻',pricing:'free',rating:4.7,votes:789},
      {name:'SQLPad',slug:'sqlpad',icon:'🗄️',pricing:'free',rating:4.8,votes:512},
      {name:'DevDocs BR',slug:'devdocs-br',icon:'📖',pricing:'free',rating:4.9,votes:891},
      {name:'FlowAI',slug:'flowai',icon:'🤖',pricing:'freemium',rating:4.5,votes:342},
    ]
  },
];

const CATEGORY_COLLECTIONS = [
  {emoji:'🤖',title:'Inteligência Artificial',slug_filter:'inteligencia-artificial',count:3,desc:'Automação, geração de texto e análise de dados com IA.'},
  {emoji:'💻',title:'Ferramentas para Devs',slug_filter:'desenvolvimento',count:4,desc:'Editor, SQL, docs e APIs — tudo que dev precisa.'},
  {emoji:'📣',title:'Marketing Digital',slug_filter:'marketing',count:3,desc:'Agendamento, copy e análise de campanhas.'},
  {emoji:'🚀',title:'Produtividade',slug_filter:'produtividade',count:3,desc:'Timer, planejador e resumidor para render mais.'},
  {emoji:'⚡',title:'Automação',slug_filter:'automacao',count:2,desc:'Formulários, pipelines e integrações sem código.'},
  {emoji:'🎨',title:'Design',slug_filter:'design',count:2,desc:'Logos, UI e identidade visual em minutos.'},
];

function priceBadge(t){
  return {free:'<span class="text-xs px-1.5 py-0.5 rounded-full badge-free">Grátis</span>',freemium:'<span class="text-xs px-1.5 py-0.5 rounded-full badge-freemium">Freemium</span>',paid:'<span class="text-xs px-1.5 py-0.5 rounded-full badge-paid">Pago</span>',subscription:'<span class="text-xs px-1.5 py-0.5 rounded-full badge-subscription">Assinatura</span>'}[t]||'';
}

function stars(r){
  return Array.from({length:5},(_,i)=>`<svg width="10" height="10" viewBox="0 0 24 24" fill="${i<Math.round(r||0)?'#fbbf24':'#2d2d3d'}"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`).join('');
}

function renderOfficialCard(c, idx){
  const colors = [
    'rgba(74,222,128,.08)','rgba(251,191,36,.08)',
    'rgba(129,140,248,.08)','rgba(29,158,117,.08)'
  ];
  const borders = [
    'rgba(74,222,128,.25)','rgba(251,191,36,.2)',
    'rgba(129,140,248,.2)','rgba(29,158,117,.25)'
  ];
  return `
    <div class="coll-card p-6" style="border-color:${borders[idx%4]};background:${colors[idx%4]}" onclick="openCollection(${idx})">
      <div class="text-3xl mb-4">${c.emoji}</div>
      <h3 class="font-display font-700 text-white text-base mb-2">${c.title}</h3>
      <p class="text-gray-400 text-xs leading-relaxed mb-4">${c.desc}</p>
      <div class="flex items-center justify-between">
        <span class="text-xs text-gray-600">${c.products.length} ferramentas</span>
        <div class="flex -space-x-1">
          ${c.products.slice(0,3).map(p=>`<div class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-700 border border-white/10" style="background:#1a1a24;color:#4ade80">${p.name.charAt(0)}</div>`).join('')}
        </div>
      </div>
    </div>`;
}

function renderCategoryCard(c){
  return `
    <a href="explore.html?category=${c.slug_filter}" class="coll-card p-6">
      <div class="flex items-center gap-3 mb-3">
        <span class="text-2xl">${c.emoji}</span>
        <div>
          <h3 class="font-display font-700 text-white text-base">${c.title}</h3>
          <span class="text-xs text-gray-600">${c.count} ferramentas</span>
        </div>
      </div>
      <p class="text-gray-400 text-sm">${c.desc}</p>
      <div class="mt-4 text-xs text-brand-400 font-500">Ver coleção →</div>
    </a>`;
}

function openCollection(idx){
  const c = COLLECTIONS[idx];
  const modal = document.getElementById('collection-modal');
  document.getElementById('modal-content').innerHTML = `
    <div class="flex items-center gap-3 mb-6">
      <span class="text-4xl">${c.emoji}</span>
      <div>
        <h2 class="font-display text-2xl font-800 text-white">${c.title}</h2>
        <p class="text-gray-400 text-sm mt-0.5">${c.desc}</p>
      </div>
    </div>
    <div class="space-y-3">
      ${c.products.map(p=>`
        <a href="saas.html?slug=${p.slug}" class="mini-card hover:border-brand-500/30 transition-colors">
          <div class="w-9 h-9 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style="background:rgba(255,255,255,.05)">${p.icon}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="font-500 text-white text-sm">${p.name}</span>
              ${priceBadge(p.pricing)}
            </div>
            <div class="flex items-center gap-1 mt-0.5">${stars(p.rating)}<span class="text-xs text-gray-600 ml-1">${p.rating}</span></div>
          </div>
          <span class="text-xs text-gray-600">▲ ${p.votes}</span>
        </a>`).join('')}
    </div>
    <div class="mt-6 pt-5 border-t border-white/5">
      <a href="explore.html" class="text-sm text-brand-400 hover:text-brand-300">Ver todos os SaaS →</a>
    </div>`;
  modal.style.display = 'flex';
}

function closeModal(){
  document.getElementById('collection-modal').style.display = 'none';
}

document.getElementById('collection-modal').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

document.getElementById('official-grid').innerHTML = COLLECTIONS.map((c,i)=>renderOfficialCard(c,i)).join('');
document.getElementById('category-collections').innerHTML = CATEGORY_COLLECTIONS.map(renderCategoryCard).join('');
// Enriquece com dados reais do banco
DB.getCollections().then(cols => {
  if(!cols||!cols.length) return;
  const grid = document.getElementById('official-grid');
  const items = cols.map((c,i) => {
    const emoji = c.cover_emoji || '📦';
    const count = Array.isArray(c.saas_ids) ? c.saas_ids.length : 0;
    const colors = ['rgba(74,222,128,.08)','rgba(251,191,36,.08)','rgba(129,140,248,.08)','rgba(29,158,117,.08)'];
    const borders = ['rgba(74,222,128,.25)','rgba(251,191,36,.2)','rgba(129,140,248,.2)','rgba(29,158,117,.25)'];
    return '<div class="coll-card p-6" style="border-color:'+borders[i%4]+';background:'+colors[i%4]+'" onclick="openModal('+i+')">'
      +'<div class="text-3xl mb-4">'+emoji+'</div>'
      +'<h3 class="font-display font-700 text-white text-base mb-2">'+c.title+'</h3>'
      +'<p class="text-gray-400 text-xs leading-relaxed mb-4">'+c.description+'</p>'
      +'<div class="flex items-center justify-between"><span class="text-xs text-gray-600">'+count+' ferramentas</span></div>'
      +'</div>';
  });
  grid.innerHTML = items.join('');
}).catch(()=>{});
</script>
